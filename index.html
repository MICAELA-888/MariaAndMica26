<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Micaela & María | Julio 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f8f4ee;
      color: #3b352f;
      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    .hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 24px;

  background-image:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55))
    url('family.jpeg');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

    .subtitle {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: #9b8c7d;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 500;
      margin-bottom: 12px;
      color: #ffffff;
text-shadow: 0 3px 20px rgba(0,0,0,0.6);
    }

    .phrase {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
      max-width: 600px;
      margin-bottom: 32px;
      color: #6b6258;
      color: #ffffff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .details {
      font-size: 1rem;
      letter-spacing: 1px;
      margin-bottom: 40px;
      color: #7a7066;
      color: #ffffff;
      color: #ffffff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      border: 1px solid #b9a999;
      color: #3b352f;
      text-decoration: none;
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .button:hover {
      background-color: #b9a999;
      color: white;
    }
  </style>
</head>

<body>

  <section class="hero">

    <p class="subtitle">From Sucre to Buenos Aires</p>

    <h1>Micaela & María</h1>

    <p class="phrase">
      “Spoiler alert: era amor.”
    </p>

    <p class="details">
      Julio 2026 · Buenos Aires, Argentina
    </p>

    <a href="#historia" class="button">
      Conoce nuestra historia
    </a>

  </section>

</body>
</html>
